server:
  host: 0.0.0.0
  port: 9500

audio:
  radio_pan: 0.0  # -1.0 = left ear, 0.0 = both ears, 1.0 = right ear
  ack_chance: 0.5  # 0.0 = units never voice-acknowledge, 1.0 = always
  radio_distance: 10.0  # meters — beyond this, NPC voice uses radio effect
  radio:
    low_cut_hz: 300  # band-pass low cutoff
    high_cut_hz: 3000  # band-pass high cutoff
    distortion: 2.0  # tanh drive (higher = more crunch)
    noise_level: 0.02  # white noise mix (0-1)
    squelch_duration: 0.05  # squelch burst in seconds
    use_biquad: true  # true = biquad filter (realistic), false = simple IIR (basic)

stt:
  system: whisper  # whisper | deepgram | windows
  whisper:
    model_path: ggml-base.en.bin
    language: en  # en, ru, auto, etc.
  deepgram:
    api_key: YOUR_DEEPGRAM_API_KEY
    model: nova-2
    language: ru
    encoding: linear16
    sample_rate: 16000
  windows:
    language: en-US  # BCP-47 locale: en-US, ru-RU, uk-UA, etc.
  google:
    api_key: YOUR_GOOGLE_API_KEY
    language: ru-RU
  azure:
    subscription_key: YOUR_AZURE_KEY
    region: eastus  # Azure region
    language: ru-RU

tts:
  system: piper  # piper | elevenlabs
  piper:
    url: http://localhost:5000
  elevenlabs:
    api_key: YOUR_ELEVENLABS_API_KEY
    model_id: eleven_multilingual_v2
    stability: 0.75
    similarity_boost: 0.75
    style: 0.2
    use_speaker_boost: false
    voices:
      default: YOUR_DEFAULT_VOICE_ID
      blufor: YOUR_BLUFOR_VOICE_ID
      opfor: YOUR_OPFOR_VOICE_ID
      indfor: YOUR_INDFOR_VOICE_ID
      # per unit name:
      # Miller: YOUR_MILLER_VOICE_ID

llm:
  intent:
    system: gemini  # gemini | claude
    gemini:
      api_key: YOUR_GEMINI_API_KEY
      model: gemini-2.0-flash-lite
      thinking_budget: 0
    claude:
      api_key: YOUR_CLAUDE_API_KEY
      model: claude-sonnet-4-20250514
  dialog:
    system: claude  # gemini | claude
    gemini:
      api_key: YOUR_GEMINI_API_KEY
      model: gemini-2.0-flash-lite
      thinking_budget: 0
    claude:
      api_key: YOUR_CLAUDE_API_KEY
      model: claude-sonnet-4-20250514

name: CI Build

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish Extension (NativeAOT)
        run: dotnet publish src/arma-dll -c Release -r win-x64 -o publish/extension

      - name: Publish Server (single exe)
        run: dotnet publish src/server -c Release -r win-x64 -o publish/server

      - name: Bundle server distribution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish/server/ZdoArmaVoice.Server.exe dist/
          Copy-Item -Recurse src/server-data dist/server-data
          Copy-Item config-example.yaml dist/config-example.yaml

      - name: Generate HEMTT project.toml from git tag
        shell: pwsh
        run: |
          $tag = git describe --tags --exact-match 2>$null
          if (-not $tag) { Write-Error "No git tag found on this commit. Tag with vX.Y.Z to build."; exit 1 }
          if ($tag -match '^v?(\d+)\.(\d+)\.(\d+)') {
            $major = $Matches[1]; $minor = $Matches[2]; $patch = $Matches[3]
          } else {
            Write-Error "Tag '$tag' does not match vMAJOR.MINOR.PATCH"; exit 1
          }
          New-Item -ItemType Directory -Force -Path .hemtt | Out-Null
          @"
          name = "zdo_arma_voice"
          prefix = "zdo_arma_voice"
          author = "drzdo"

          [version]
          major = $major
          minor = $minor
          patch = $patch
          "@ | Set-Content .hemtt/project.toml
          Write-Host "Generated project.toml for v$major.$minor.$patch"

      - name: Setup HEMTT addons symlink
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path addons | Out-Null
          New-Item -ItemType Junction -Path addons/zdo_arma_voice -Target (Resolve-Path src/arma-mod).Path | Out-Null

      - name: Download HEMTT
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo BrettMayson/HEMTT --pattern "windows-x64.zip"
          Expand-Archive windows-x64.zip -DestinationPath hemtt_bin
          Copy-Item hemtt_bin/hemtt.exe hemtt.exe

      - name: Pack PBO
        run: ./hemtt.exe build

      - name: Package mod
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/@zdo_arma_voice/addons
          Copy-Item publish/extension/zdo_arma_voice_x64.dll package/@zdo_arma_voice/
          Copy-Item .hemttout/build/addons/*.pbo package/@zdo_arma_voice/addons/

      - name: Upload Mod
        uses: actions/upload-artifact@v5
        with:
          name: zdo_arma_voice_mod
          path: package/@zdo_arma_voice/

      - name: Upload Server
        uses: actions/upload-artifact@v5
        with:
          name: zdo-arma-voice-server
          path: dist/

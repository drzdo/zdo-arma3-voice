name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish Extension (NativeAOT)
        run: dotnet publish src/ArmaVoice.Extension -c Release -r win-x64 -o publish/extension

      - name: Publish Server
        run: dotnet publish src/ArmaVoice.Server -c Release -r win-x64 --self-contained -o publish/server

      - name: Upload Extension DLL
        uses: actions/upload-artifact@v4
        with:
          name: arma3-mic-extension
          path: publish/extension/arma3_mic_x64.dll

      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: arma3-mic-server
          path: publish/server/

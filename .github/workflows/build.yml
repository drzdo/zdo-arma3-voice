name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish Extension (NativeAOT)
        run: dotnet publish src/ArmaVoice.Extension -c Release -r win-x64 -o publish/extension

      - name: Publish Server (single exe)
        run: dotnet publish src/ArmaVoice.Server -c Release -r win-x64 -o publish/server

      - name: Download HEMTT
        shell: pwsh
        run: |
          $tag = (Invoke-RestMethod "https://api.github.com/repos/BrettMayson/HEMTT/releases/latest").tag_name
          Invoke-WebRequest -Uri "https://github.com/BrettMayson/HEMTT/releases/download/$tag/windows-x64.zip" -OutFile "hemtt.zip"
          Expand-Archive hemtt.zip -DestinationPath hemtt_bin
          Copy-Item hemtt_bin/hemtt.exe hemtt.exe

      - name: Pack PBO
        run: ./hemtt.exe build

      - name: Package mod
        shell: pwsh
        run: |
          Write-Host "--- HEMTT output ---"
          Get-ChildItem -Recurse .hemttout | ForEach-Object { $_.FullName }
          New-Item -ItemType Directory -Force -Path package/@arma3_mic/addons
          Copy-Item publish/extension/arma3_mic_x64.dll package/@arma3_mic/
          Copy-Item .hemttout/build/addons/*.pbo package/@arma3_mic/addons/

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: '@arma3_mic'
          path: package/@arma3_mic/

      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: arma3-mic-server
          path: publish/server/ArmaVoice.Server.exe

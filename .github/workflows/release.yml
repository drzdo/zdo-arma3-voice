name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/ci-build.yml

  release:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Move-Item -LiteralPath "artifacts/arma3_mic_mod" -Destination "staging/@arma3_mic"
          Push-Location staging
          Compress-Archive -LiteralPath "@arma3_mic" -DestinationPath ../arma3_mic_mod.zip
          Pop-Location

      - name: Package server
        shell: pwsh
        run: |
          Compress-Archive -LiteralPath "artifacts/arma3-mic-server" -DestinationPath arma3_mic_server.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            arma3_mic_mod.zip
            arma3_mic_server.zip

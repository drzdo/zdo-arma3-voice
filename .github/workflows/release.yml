name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/ci-build.yml

  release:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Move-Item -LiteralPath "artifacts/zdo_arma_voice_mod" -Destination "staging/@zdo_arma_voice"
          Push-Location staging
          Compress-Archive -LiteralPath "@zdo_arma_voice" -DestinationPath ../zdo_arma_voice_mod.zip
          Pop-Location

      - name: Package server
        shell: pwsh
        run: |
          Compress-Archive -LiteralPath "artifacts/zdo_arma_voice_server" -DestinationPath zdo_arma_voice_server.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zdo_arma_voice_mod.zip
            zdo_arma_voice_server.zip

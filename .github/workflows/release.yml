name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/ci-build.yml

  release:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release
        shell: pwsh
        run: |
          Rename-Item artifacts/arma3_mic_mod artifacts/@arma3_mic
          Compress-Archive -Path artifacts/@arma3_mic -DestinationPath arma3_mic_mod.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            arma3_mic_mod.zip
            artifacts/arma3-mic-server/ArmaVoice.Server.exe

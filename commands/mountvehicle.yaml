id: mountvehicle
description: "Get in the vehicle the player is looking at in a specific role. LLM must set 'formation' field to the role: 'driver', 'gunner', 'commander', 'cargo', or 'any'. Triggers: 'get in as driver', 'садись за руль', 'be the gunner', 'на место стрелка'. If no role specified, use 'any'."
sqf: |
  private _veh = [_pos] call zdoArmaMic_fnc_findVehicleAt;
  if (isNull _veh) exitWith { systemChat "No vehicle found" };
  private _role = if (_formation != "") then { _formation } else { "any" };
  {
      private _u = _x call BIS_fnc_objectFromNetId;
      switch (_role) do {
          case "driver": { _u moveInDriver _veh };
          case "gunner": { _u moveInGunner _veh };
          case "commander": { _u moveInCommander _veh };
          case "cargo": { _u moveInCargo _veh };
          default { _u moveInAny _veh };
      };
  } forEach _units;

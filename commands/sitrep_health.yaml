id: sitrep_health
description: "Report health status of units. Triggers: 'status report', 'how are you', 'report health', 'как дела', 'доложи о состоянии', 'ранен?'. Reports wounds, bleeding, pain if ACE3 medical is active, or basic damage otherwise. The SQF result is a text string — show it to the player via systemChat."
sqf: |
  private _report = [_units] call zdoArmaMic_fnc_getHealth;
  systemChat _report;

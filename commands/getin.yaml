id: getin
description: "Get in the vehicle the player is looking at. Triggers: 'get in', 'mount up', 'садись', 'в машину', 'загружайтесь'."
sqf: |
  private _veh = [_pos] call zdoArmaMic_fnc_findVehicleAt;
  diag_log format ["ArmaVoice getin: pos=%1 veh=%2 isNull=%3 units=%4", _pos, _veh, isNull _veh, _units];
  if (isNull _veh) exitWith { systemChat "No vehicle found" };
  {
      private _u = _x call BIS_fnc_objectFromNetId;
      diag_log format ["ArmaVoice getin: unit=%1 isNull=%2", _u, isNull _u];
      _u assignAsCargo _veh;
      [_u] orderGetIn true;
  } forEach _units;
